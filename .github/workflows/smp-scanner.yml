name: SMP Scanner (Stage 1)

on:
  schedule:
    - cron: '0 */2 * * *'  # Tiap 2 jam (00:00, 02:00, 04:00, dst)
  workflow_dispatch:  # Manual trigger untuk testing

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Penting untuk auto-commit
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install ccxt pandas numpy requests
    
    - name: Run SMP Scanner
      env:
        BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
        BINANCE_SECRET: ${{ secrets.BINANCE_SECRET }}
      run: python scripts/scan_smp.py
    
    - name: Commit Watchlist
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add watchlist.json
        git diff --staged --quiet || git commit -m "Update watchlist SMP $(date -u +%Y-%m-%d-%H:%M)"
        git push
